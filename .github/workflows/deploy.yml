name: Deploy Erodas Atlas

on:
  push:
    branches: [main]
  schedule:
    # Rebuild every 6 hours to pick up vault changes
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout erodas-atlas
        uses: actions/checkout@v7

      - name: Clone Korlornium vault
        run: git clone --depth 1 https://github.com/austinczeller/Korlornium.git vault

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pyyaml

      - name: Sync vault content to src/content/docs
        run: python scripts/sync-vault.py --vault vault --output src/content/docs --image-output public/vault-images --base-url /erodas-atlas

      - name: Copy map image into static dir
        run: cp vault/z_Assests/Images/Korlornium.png public/static/map/Korlornium.png

      - name: Copy Calendarium data to static
        run: |
          mkdir -p public/static/calendar
          cp vault/.obsidian/plugins/calendarium/data.json public/static/calendar/calendarium.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
